version: '3'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./static:/app/static
    env_file:
      - .env
    environment:
      - ENV=development
      - PORT=8080
    restart: unless-stopped

